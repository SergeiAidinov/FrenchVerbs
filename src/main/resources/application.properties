address: 'localhost'
server.port: 8080
spring.datasource.url=jdbc:postgresql://localhost:5432/frenchverbs_db
#?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.show-sql=true
liquibase.enable=true
spring.driver-class-name: org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL9Dialect
spring.liquibase.changelog: /db/changelog/db.changelog-master.xml
spring.jpa.hibernate.ddl-auto=none